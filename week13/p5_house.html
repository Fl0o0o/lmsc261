<!DOCTYPE html>
<html>
<head>
    <title>p5 House</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
</head>
<body>

<script>
function setup() {
    createCanvas(600, 400);
}

function draw() {
    background(150, 150, 150);

    fill("yellow");
    circle(0, 0, 400);

    fill("blue");
    triangle(200, 200, 400, 200, 300, 100);

    fill("purple");
    rect(200, 200, 200, 200);

    fill("green");
    triangle(0, 400, 20, 360, 40, 400);
    triangle(40, 400, 60, 360, 80, 400);
    triangle(80, 400, 100, 360, 120, 400);
    triangle(120, 400, 140, 360, 160, 400);
    triangle(160, 400, 180, 360, 200, 400);
    triangle(200, 400, 220, 360, 240, 400);
    triangle(240, 400, 260, 360, 280, 400);
    triangle(280, 400, 300, 360, 320, 400);
    triangle(320, 400, 340, 360, 360, 400);
    triangle(360, 400, 380, 360, 400, 400);
    triangle(400, 400, 420, 360, 440, 400);
    triangle(440, 400, 460, 360, 480, 400);
    triangle(480, 400, 500, 360, 520, 400);
    triangle(520, 400, 540, 360, 560, 400);
    triangle(560, 400, 580, 360, 600, 400);
}
</script>

</body>
</html>
